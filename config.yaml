# Spread scanner configuration.
# Edit the watchlist and tune the parameters, then run `python run.py`.

# -------------------------------------------------------------------------
# FALLBACK HALAL WATCHLIST
# Only used when `universe.source` is 'config', or when the ETF fetch fails.
# By default the universe is auto-fetched from the ETFs in `universe.etfs` and
# re-verified by the financial-ratio formula (see below) — you don't need to
# maintain this list. It's a curated industry-clean set as a safety net.
#
# ⚠️ Not a fatwa. Re-verify each name with a dedicated screener (Zoya, Musaffa)
#    before trading, and purify incidental impure income.
# -------------------------------------------------------------------------
tickers:
  # Halal market benchmarks (Shariah-screened ETFs)
  - SPUS
  - HLAL
  # Semiconductors
  - NVDA
  - AMD
  - AVGO
  - QCOM
  - MU
  - AMAT
  - LRCX
  - MRVL
  - ARM
  - TXN
  - INTC
  # Software / platforms
  - AAPL
  - MSFT
  - ORCL
  - ADBE
  - CRM
  - NOW
  - PLTR
  - AMZN
  - GOOGL
  - META
  - UBER
  - SHOP
  # High-beta movers
  - TSLA
  - SMCI
  # Healthcare / pharma
  - LLY
  - JNJ
  # Energy
  - XOM
  - CVX

params:
  horizon_days: 10          # ~2 weeks of trading days (the "short term" window)
  history_period: 1y        # how much history to download (yfinance period string)
  bb_length: 20             # Bollinger Bands lookback
  bb_mult: 2.0              # Bollinger Bands stdev multiplier
  kc_length: 20             # Keltner Channel lookback
  kc_mult: 1.5              # Keltner Channel ATR multiplier
  atr_length: 14            # ATR lookback
  vol_lookback: 20          # window for the expected-move volatility estimate
  percentile_lookback: 120  # window for bandwidth / HV percentile ranks (~6mo)

# Where the scan universe comes from.
universe:
  source: etf               # 'etf' = auto-fetch Shariah ETF holdings; 'config' = use the `tickers:` list above
  etfs:                     # Shariah-compliant ETFs to pull holdings from (union, by weight)
    - SPUS                  #   SP Funds S&P 500 Sharia
    - HLAL                  #   Wahed FTSE USA Shariah
  max_holdings: 30          # cap the universe after merging the funds
  fallback_to_config: true  # if the fetch fails, fall back to the `tickers:` list

halal_screen:
  # Industry-only safety net: drop any ticker whose Yahoo sector/industry matches
  # a prohibited category. Fail-open if Yahoo returns no sector data.
  live_sector_filter: true

  # Financial-ratio formula (AAOIFI / S&P Dow Jones Islamic style) — re-verifies
  # each name's balance sheet. Approximation; not a fatwa. See spread_scanner/halal.py.
  financial_formula:
    enabled: true
    mode: filter            # 'filter' = drop names that fail; 'annotate' = keep all, just report ratios
    max_debt_ratio: 0.33    # interest-bearing debt / market cap
    max_cash_ratio: 0.33    # cash & equivalents / market cap
    max_receivables_ratio: null   # accounts receivable / market cap; null = skip (saves a call/ticker)

options:
  # Compare the option-implied move to the historical expected move and flag
  # CHEAP / FAIR / RICH. Adds 1-2 network calls per ticker, so it only prices
  # the most coiled names (top of the ranking).
  enabled: true
  top_n: 15                 # how many top-ranked names to price
  margin: 0.15              # ± band around the historical move for cheap/rich

alerts:
  # POST a summary to a Slack/Discord webhook when a ticker's Setup Score
  # crosses the threshold (only fires on a NEW crossing vs the previous run).
  # Set the webhook URL in the ALERT_WEBHOOK_URL env var / GitHub secret.
  enabled: true
  score_threshold: 60

output:
  dir: public               # where report files go (served as the Pages site root)
  top: 30                   # how many rows to show in the report
